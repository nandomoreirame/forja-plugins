name: Release Plugins

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.3). Only needed for manual trigger."
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    # Guard: skip if triggered by a branch push (only run for tags or manual)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid semver: $VERSION (ref: $GITHUB_REF_NAME, event: ${{ github.event_name }})"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Sync root package.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          echo "Root package.json set to $VERSION"

      - name: Build all plugins
        run: pnpm run build

      - name: Validate plugins
        run: pnpm run validate

      - name: Package plugins from dist/
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist

          for dir in apps/forja-plugin-*/; do
            name=$(basename "$dir")
            if [[ ! -f "$dir/dist/manifest.json" ]]; then
              echo "::warning::No built manifest for $name, skipping"
              continue
            fi

            tarball="${name}-${VERSION}.tar.gz"
            tar -czf "dist/$tarball" -C "$dir/dist" .

            sha256=$(sha256sum "dist/$tarball" | cut -d' ' -f1)
            size=$(du -h "dist/$tarball" | cut -f1)
            echo "Packaged: $tarball ($size, sha256: $sha256)"
          done

      - name: Rebuild registry with SHA256
        run: pnpm run build:registry

      - name: Create per-plugin releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          for dir in apps/forja-plugin-*/; do
            name=$(basename "$dir")
            tarball="dist/${name}-${VERSION}.tar.gz"
            tag="${name}-v${VERSION}"

            if [[ ! -f "$tarball" ]]; then
              echo "::warning::Tarball not found: $tarball"
              continue
            fi

            sha256=$(sha256sum "$tarball" | cut -d' ' -f1)

            if gh release view "$tag" &>/dev/null; then
              echo "Release $tag exists, uploading asset..."
              gh release upload "$tag" "$tarball" --clobber
            else
              echo "Creating release $tag..."
              gh release create "$tag" \
                "$tarball" \
                --title "${name} v${VERSION}" \
                --notes "## ${name} v${VERSION}

          **SHA256:** \`${sha256}\`

          ### Install
          Download the \`.tar.gz\` asset below or install via Forja's plugin marketplace." \
                --latest=false
            fi

            echo "Released: $tag"
          done

      - name: Update registry on gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ steps.version.outputs.version }}"

          cp public/registry.json /tmp/registry.json

          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/registry.json registry.json

          git add registry.json
          git diff --cached --quiet && echo "Registry unchanged" && exit 0

          git commit -m "chore: update registry for v$VERSION"
          git push origin gh-pages
