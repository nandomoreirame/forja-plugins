name: Release Plugins

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.3). Only needed for manual trigger."
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    # Guard: skip if triggered by a branch push (only run for tags or manual)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid semver: $VERSION (ref: $GITHUB_REF_NAME, event: ${{ github.event_name }})"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Sync manifest versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for manifest in plugins/*/manifest.json; do
            if [[ -f "$manifest" ]]; then
              jq --arg v "$VERSION" '.version = $v' "$manifest" > "${manifest}.tmp" && mv "${manifest}.tmp" "$manifest"
              echo "Updated: $manifest -> $VERSION"
            fi
          done

      - name: Validate plugins
        run: node scripts/validate-plugins.mjs

      - name: Package plugins
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist

          for dir in plugins/*/; do
            name=$(basename "$dir")
            if [[ ! -f "$dir/manifest.json" ]]; then
              continue
            fi

            tarball="${name}-${VERSION}.tar.gz"
            tar -czf "dist/$tarball" -C plugins "$name"

            sha256=$(sha256sum "dist/$tarball" | cut -d' ' -f1)
            size=$(du -h "dist/$tarball" | cut -f1)
            echo "Packaged: $tarball ($size, sha256: $sha256)"
          done

      - name: Rebuild registry with SHA256
        run: node scripts/build-registry.mjs

      - name: Create per-plugin releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          for dir in plugins/*/; do
            name=$(basename "$dir")
            tarball="dist/${name}-${VERSION}.tar.gz"
            tag="${name}-v${VERSION}"

            if [[ ! -f "$tarball" ]]; then
              echo "::warning::Tarball not found: $tarball"
              continue
            fi

            sha256=$(sha256sum "$tarball" | cut -d' ' -f1)

            if gh release view "$tag" &>/dev/null; then
              echo "Release $tag exists, uploading asset..."
              gh release upload "$tag" "$tarball" --clobber
            else
              echo "Creating release $tag..."
              gh release create "$tag" \
                "$tarball" \
                --title "${name} v${VERSION}" \
                --notes "## ${name} v${VERSION}

          **SHA256:** \`${sha256}\`

          ### Install
          Download the \`.tar.gz\` asset below or install via Forja's plugin marketplace." \
                --latest=false
            fi

            echo "Released: $tag"
          done

      - name: Update registry on gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ steps.version.outputs.version }}"

          # Save artifacts built during release
          cp public/registry.json /tmp/registry.json
          for manifest in plugins/*/manifest.json; do
            cp "$manifest" "/tmp/$(echo "$manifest" | tr '/' '_')"
          done

          # Push registry.json to gh-pages
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/registry.json registry.json

          git add registry.json
          git diff --cached --quiet && echo "Registry unchanged" && exit 0

          git commit -m "chore: update registry for v$VERSION"
          git push origin gh-pages

      - name: Sync manifest versions to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ steps.version.outputs.version }}"

          # Checkout main (tag checkout is detached HEAD)
          DEFAULT_BRANCH=$(gh repo view --json defaultBranchRef -q .defaultBranchRef.name)
          git fetch origin "$DEFAULT_BRANCH"
          git checkout -f "$DEFAULT_BRANCH"

          # Restore updated manifests
          for manifest in plugins/*/manifest.json; do
            tmp="/tmp/$(echo "$manifest" | tr '/' '_')"
            if [[ -f "$tmp" ]]; then
              cp "$tmp" "$manifest"
            fi
          done

          git add plugins/*/manifest.json
          git diff --cached --quiet && echo "No manifest changes to sync" && exit 0

          git commit -m "chore(release): sync manifests to v${VERSION}"
          git push origin "$DEFAULT_BRANCH"
