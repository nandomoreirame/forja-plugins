name: Release Plugins

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate version
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid semver version: ${{ inputs.version }}"
            exit 1
          fi

      - name: Validate plugins
        run: node scripts/validate-plugins.mjs

      - name: Bump versions
        run: |
          VERSION="${{ inputs.version }}"

          # Update package.json
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

          # Update all plugin manifests
          for manifest in plugins/*/manifest.json; do
            jq --arg v "$VERSION" '.version = $v' "$manifest" > "$manifest.tmp"
            mv "$manifest.tmp" "$manifest"
            echo "Bumped: $manifest -> $VERSION"
          done

      - name: Package plugins
        id: package
        run: |
          VERSION="${{ inputs.version }}"
          mkdir -p dist

          PLUGINS=""
          for dir in plugins/*/; do
            name=$(basename "$dir")
            manifest="$dir/manifest.json"

            if [[ ! -f "$manifest" ]]; then
              continue
            fi

            tarball="${name}-${VERSION}.tar.gz"
            tar -czf "dist/$tarball" -C plugins "$name"

            sha256=$(sha256sum "dist/$tarball" | cut -d' ' -f1)
            size=$(du -h "dist/$tarball" | cut -f1)

            echo "Packaged: $tarball ($size, sha256: $sha256)"
            PLUGINS="${PLUGINS}${name},"
          done

          echo "plugins=${PLUGINS%,}" >> "$GITHUB_OUTPUT"

      - name: Rebuild registry with SHA256
        run: node scripts/build-registry.mjs

      - name: Create per-plugin releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"

          for dir in plugins/*/; do
            name=$(basename "$dir")
            tarball="dist/${name}-${VERSION}.tar.gz"
            tag="${name}-v${VERSION}"

            if [[ ! -f "$tarball" ]]; then
              echo "::warning::Tarball not found: $tarball"
              continue
            fi

            sha256=$(sha256sum "$tarball" | cut -d' ' -f1)

            if gh release view "$tag" &>/dev/null; then
              echo "Release $tag exists, uploading asset..."
              gh release upload "$tag" "$tarball" --clobber
            else
              echo "Creating release $tag..."
              gh release create "$tag" \
                "$tarball" \
                --title "${name} v${VERSION}" \
                --notes "$(cat <<EOF
          ## ${name} v${VERSION}

          **SHA256:** \`${sha256}\`

          ### Install
          Download the \`.tar.gz\` asset below or install via Forja's plugin marketplace.
          EOF
          )" \
                --latest=false
            fi

            echo "Released: $tag"
          done

      - name: Commit updated versions and registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json plugins/*/manifest.json public/registry.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore: release plugins v${{ inputs.version }}"
          git push
