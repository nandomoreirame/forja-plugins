<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="header-title">Git</h1>
        <span id="current-branch-badge" class="branch-badge" aria-label="Current branch"></span>
      </div>
      <span id="project-name" class="project-name">No project</span>
    </header>

    <!-- Tab Bar -->
    <nav class="tab-bar" role="tablist" aria-label="Git panels">
      <button class="tab active" role="tab" aria-selected="true" aria-controls="panel-branches" id="tab-branches" data-tab="branches" tabindex="0">Branches</button>
      <button class="tab" role="tab" aria-selected="false" aria-controls="panel-history" id="tab-history" data-tab="history" tabindex="-1">History</button>
      <button class="tab" role="tab" aria-selected="false" aria-controls="panel-changes" id="tab-changes" data-tab="changes" tabindex="-1">Changes</button>
    </nav>

    <!-- Branches Panel -->
    <section id="panel-branches" class="panel" role="tabpanel" aria-labelledby="tab-branches">
      <div id="branch-graph-container" class="graph-container">
        <svg id="branch-graph-svg" aria-hidden="true"></svg>
      </div>
      <div id="branch-list" class="branch-list"></div>
      <form id="branch-create-form" class="branch-create-form" aria-label="Create new branch">
        <input
          type="text"
          id="branch-name-input"
          class="input-field"
          placeholder="New branch name..."
          aria-label="Branch name"
          autocomplete="off"
        />
        <button type="submit" class="btn btn-primary btn-small">Create</button>
      </form>
    </section>

    <!-- History Panel -->
    <section id="panel-history" class="panel" role="tabpanel" aria-labelledby="tab-history" hidden>
      <div class="toolbar">
        <button type="button" id="history-refresh-btn" class="btn btn-ghost btn-small icon-btn" aria-label="Refresh history">Refresh</button>
      </div>
      <div id="commit-list" class="commit-list"></div>
      <div id="history-empty" class="empty-state" hidden>
        <p>No commits found.</p>
      </div>
    </section>

    <!-- Changes Panel -->
    <section id="panel-changes" class="panel" role="tabpanel" aria-labelledby="tab-changes" hidden>
      <div class="toolbar">
        <button type="button" id="changes-refresh-btn" class="btn btn-ghost btn-small icon-btn" aria-label="Refresh changes">Refresh</button>
      </div>

      <div id="changes-content">
        <div id="staged-section" class="file-section" hidden>
          <div class="file-section-header">
            <span>Staged</span>
            <span id="staged-count" class="file-count"></span>
          </div>
          <div id="staged-list" class="file-list"></div>
        </div>

        <div id="unstaged-section" class="file-section" hidden>
          <div class="file-section-header">
            <span>Unstaged</span>
            <span id="unstaged-count" class="file-count"></span>
          </div>
          <div id="unstaged-list" class="file-list"></div>
        </div>

        <div id="untracked-section" class="file-section" hidden>
          <div class="file-section-header">
            <span>Untracked</span>
            <span id="untracked-count" class="file-count"></span>
          </div>
          <div id="untracked-list" class="file-list"></div>
        </div>
      </div>

      <div id="diff-viewer" class="diff-viewer" hidden>
        <div class="diff-header">
          <span id="diff-filename" class="diff-filename"></span>
          <button type="button" id="diff-close-btn" class="btn btn-ghost btn-small" aria-label="Close diff">Close</button>
        </div>
        <pre id="diff-content" class="diff-content"></pre>
      </div>

      <div id="changes-empty" class="empty-state" hidden>
        <p>Working tree clean.</p>
      </div>
    </section>

    <!-- Global States -->
    <div id="no-project-state" class="empty-state" hidden>
      <p>Open a project to use Git Manager.</p>
    </div>

    <div id="no-git-state" class="empty-state" hidden>
      <p>This project is not a Git repository.</p>
    </div>

    <div id="loading-state" class="empty-state" hidden>
      <p>Loading...</p>
    </div>

    <!-- Confirmation Dialog -->
    <div id="confirm-dialog" class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirm-message" hidden>
      <div class="confirm-dialog-content">
        <p id="confirm-message" class="confirm-message"></p>
        <div class="confirm-actions">
          <button type="button" id="confirm-yes-btn" class="btn btn-primary btn-small">Confirm</button>
          <button type="button" id="confirm-no-btn" class="btn btn-ghost btn-small">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Status region for screen readers -->
    <div id="status-region" class="sr-only" aria-live="polite" role="status"></div>
  </div>

  <script src="git-utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
