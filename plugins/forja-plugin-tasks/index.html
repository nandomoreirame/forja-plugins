<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="plugin-header">
      <div class="header-top">
        <h2 class="plugin-title">Tasks</h2>
        <div id="stats" class="stats-badge">
          <div id="stats-progress" class="progress-bar"><div id="stats-progress-fill" class="progress-fill"></div></div>
          <span id="stats-text"></span>
        </div>
      </div>
      <span id="project-name" class="plugin-subtitle">No project</span>
    </header>

    <div id="no-project-state" class="empty-state">
      <p class="empty-icon">&#128194;</p>
      <p class="empty-title">No project selected</p>
      <p class="empty-description">Open a project to manage its tasks.</p>
    </div>

    <div id="empty-state" class="empty-state" style="display:none">
      <p class="empty-icon">&#9745;</p>
      <p class="empty-title">No tasks yet</p>
      <p class="empty-description">Add your first task below.</p>
    </div>

    <div id="loading-state" class="empty-state" style="display:none">
      <p class="empty-title">Loading...</p>
    </div>

    <main id="task-list" class="task-list" style="display:none"></main>

    <footer id="add-form" class="add-form" style="display:none">
      <input type="text" id="new-section-name" class="input-field input-section-name" placeholder="New section name..." />
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
